name: site-check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Python package
        run: python -m pip install -e ".[dev]"

      - name: Install Node dependencies
        run: npm ci

      - name: Lint
        run: python -m ruff check .

      - name: Compile package
        run: python -m compileall obviousbench

      - name: Validate datasets
        run: python scripts/validate_dataset.py data/public_v0/*.jsonl data/calibration_v0/smoke_test.jsonl

      - name: Test
        run: python -m pytest tests -q
