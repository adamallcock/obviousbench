name: site-check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install Python package
        run: python -m pip install -e ".[dev]"

      - name: Install Node dependencies
        run: npm ci

      - name: Lint
        run: python -m ruff check .

      - name: Compile package
        run: python -m compileall obviousbench scripts

      - name: Validate datasets
        run: python scripts/datasets/validate_dataset.py data/public_examples/*.jsonl

      - name: Check repo hygiene
        run: python scripts/release/check_repo_hygiene.py

      - name: Test
        run: python -m pytest tests -q
