schema_version: "paper-analysis-plan-v1"
created_at: "2026-06-01"
status: "frozen_for_first_draft_evidence_run"
applies_to: "paper_v1"
no_provider_calls: true
analysis_freeze:
  frozen_for_first_draft_evidence_run: true
  post_hoc_policy:
    - "Do not add headline metrics after inspecting final model results."
    - "Label any exploratory post-hoc slice as exploratory in the paper."
    - "Do not promote exploratory proof-point reports into paper-final claims."
primary_question: "How often do public-facing language models fail short, human-trivial, objectively scored tasks?"
inputs:
  dataset_manifest: "data/splits/paper_v1_manifest.jsonl"
  model_panel: "configs/paper_v1_combined_234_overline_attempt_scored_20260602_manifest.csv"
  human_baseline: "data/human_baseline/paper_v1.csv (deferred; not reported in fast preprint)"
  evidence_run: "paper-v1-combined-234-overline-attempt-scored-20260602"
  final_comparison_dir: "results/summaries/paper-v1-combined-234-overline-attempt-scored-20260602/comparison"
  final_report_dir: "docs/reports/2026-06-02-paper-v1-combined-234-overline"
  wrong_answer_review: "docs/reports/2026-06-02-paper-v1-combined-234-overline/wrong-answer-review.csv"
  scoring_gold_dir: "tests/fixtures/scorer_gold"
primary_metrics:
  - id: "answer_accuracy"
    label: "Answer correctness"
    numerator: "answer_correct"
    denominator: "scored_samples"
    source_column: "answer_accuracy"
    interval: "wilson_95"
    paper_role: "Primary model reliability metric; accepts correct answers even when surrounding prose violates a strict interface."
secondary_metrics:
  - id: "obvious_failure_rate"
    label: "Obvious failure rate"
    source_column: "obvious_failure_rate"
    interpretation: "One minus answer-level correctness over scored samples."
  - id: "format_accuracy"
    label: "Format accuracy"
    source_column: "format_accuracy"
    interpretation: "Secondary compliance diagnostic; not the headline benchmark score."
  - id: "strict_accuracy"
    label: "Strict accuracy"
    source_column: "strict_accuracy"
    interpretation: "Secondary exact-interface diagnostic equal to answer-and-format success."
  - id: "provider_errors"
    label: "Provider errors"
    source_column: "provider_errors"
    interpretation: "Reported separately; final provider errors count as incorrect scored attempts after retries."
  - id: "cost_per_correct_usd"
    label: "Cost per correct answer"
    source_column: "cost_per_correct_usd"
    interpretation: "Secondary efficiency metric; never outranks accuracy."
  - id: "tokens_per_correct"
    label: "Tokens per correct answer"
    source_column: "tokens_per_correct"
    interpretation: "Secondary token-efficiency metric."
  - id: "overthinking_index"
    label: "Overthinking index"
    source_column: "overthinking_index"
    interpretation: "Exploratory when reasoning-token reporting is available."
intervals:
  binomial:
    method: "Wilson score interval"
    confidence_level: 0.95
    implementation: "obviousbench.analysis.statistics.wilson_interval"
  paired_deltas:
    method: "deterministic percentile bootstrap over matched item IDs"
    confidence_level: 0.95
    seed: 20260531
    resamples: 1000
    implementation: "obviousbench.analysis.statistics.paired_boolean_delta"
stratification:
  required:
    - "task_family"
    - "scorer"
  optional:
    - "subfamily"
    - "source_archetype"
    - "model_provider_route"
reported_tables:
  - id: "main_results"
    path: "paper/tables/main_results.tex"
    source: "final comparison leaderboard"
    status: "first_draft_evidence_from_20260602_run"
  - id: "family_results"
    path: "paper/tables/family_results.tex"
    source: "final family comparison"
    status: "first_draft_evidence_from_20260602_run"
  - id: "thinking_group_results"
    path: "paper/tables/thinking_group_results.tex"
    source: "final comparison grouped by inferred thinking mode"
    status: "first_draft_evidence_from_20260602_run"
  - id: "model_family_results"
    path: "paper/tables/model_family_results.tex"
    source: "final comparison grouped by model family"
    status: "first_draft_evidence_from_20260602_run"
  - id: "failure_type_summary"
    path: "paper/tables/failure_type_summary.tex"
    source: "wrong-answer review failure-type taxonomy"
    status: "first_draft_evidence_from_20260602_run"
audit_artifacts:
  - id: "provider_exclusions"
    path: "paper/tables/provider_exclusions.tex"
    source: "final provider error and timeout accounting"
    status_before_sweep: "audit_artifact_not_manuscript_table"
    manuscript_role: "Internal completeness/audit artifact unless the manuscript re-adds a provider-exclusions table."
reported_figures:
  - id: "leaderboard"
    path: "paper/figures/leaderboard.pdf"
    source: "final answer-correctness leaderboard"
    status: "first_draft_evidence_from_20260602_run"
  - id: "family_heatmap"
    path: "paper/figures/family_heatmap.pdf"
    source: "final family answer-correctness comparison"
    status: "first_draft_evidence_from_20260602_run"
  - id: "answer_format_gap"
    path: "paper/figures/answer_format_gap.pdf"
    source: "answer correctness minus strict accuracy by model"
    status: "first_draft_evidence_from_20260602_run"
  - id: "cost_frontier"
    path: "paper/figures/cost_frontier.pdf"
    source: "answer correctness versus estimated cost"
    status: "first_draft_evidence_from_20260602_run"
exclusion_policy:
  provider_errors: "Count final provider errors as incorrect scored attempts after configured retries; report counts and rates separately."
  timeouts: "Count final timeouts as incorrect scored attempts after configured retries; report counts and rates separately."
  parse_errors: "Score as incorrect when a response was delivered but not parseable by the deterministic scorer."
  duplicate_runs: "Use the frozen model-panel run manifest; do not cherry-pick retries."
  incomplete_models: "Keep visible in provider exclusions; do not rank against complete runs."
human_baseline_policy:
  status: "deferred_for_fast_preprint"
  current_use: "Do not report human accuracy, response time, or model-versus-human gaps in v1."
  item_validity_substitute: "Use reviewed item cards, answer derivations, ambiguity notes, and scorer-gold evidence."
  future_minimum_participants: 5
  future_collection_trigger: "Collect only after paper_v1 items, instructions, answer key, scorers, and thresholds are frozen."
claim_policy:
  reporting_vs_hypothesis_generation: "Final article should be primarily reporting and measurement, with hypothesis generation limited to clearly labeled discussion."
  solution_policy: "Mitigation ideas belong in discussion or future work; they must not dominate the results section."
  ranking_policy: "Rank by answer correctness with intervals and denominators visible; report strict accuracy as a secondary compliance diagnostic."
  release_policy: "Every headline claim must cite a frozen local artifact or generated table/figure."
