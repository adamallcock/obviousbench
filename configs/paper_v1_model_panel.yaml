defaults:
  temperature: 0
  max_tokens: 10000
  inspect_args:
    - "--no-log-model-api"
    - "--no-log-realtime"
    - "--timeout=60"
    - "--max-retries=0"
selection_policy:
  summary: "Frozen candidate paper panel before expensive final sweeps."
  rules:
    - "Include direct-provider frontier and small-model baselines already represented in the local model registry."
    - "Include cheap or free OpenRouter models to preserve the small/open-weight comparison surface."
    - "Use deterministic short-answer generation settings across routes where supported."
    - "Treat all aliases and prices as requiring final verification immediately before live paper sweeps."
  do_not_run_until:
    - "make -C paper readiness-preprint passes"
    - "one-sample live smoke ledger is accepted or explicitly waived"
    - "paper cost estimate is accepted"
  strict_release_requirements:
    human_baseline: "required before reporting human accuracy, response time, or model-versus-human gaps"
    readiness_profile: "strict"
    minimum_human_participants: 5
