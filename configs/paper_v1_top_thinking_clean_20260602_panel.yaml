  rules:
  - Prefer current/latest frontier model families already represented in model_thinking_settings_v1.
  - Use explicit provider thinking controls where the runner can actually pass them through.
  - Use OpenRouter for Gemini 3 thinking levels because OpenRouter maps reasoning.effort to Google thinkingLevel.
  - Do not force temperature=0; leave provider/model default randomness unless an entry explicitly sets
    it.
  - Raise small output caps to at least 2000 tokens so truncation is not confused with benchmark failure.
  - Exclude Grok 4.3 direct and OpenRouter settings from the clean full run because smoke hit provider
    content_filter on the JSON true item.
  research_question: When top models reach 100% answer accuracy, do explicit higher thinking modes add
    cost/tokens without measurable accuracy gains?
