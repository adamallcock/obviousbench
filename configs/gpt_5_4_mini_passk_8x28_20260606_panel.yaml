schema_version: paper-model-panel-v1
created_at: '2026-06-06'
run_status: planned
dataset: data/barrages/hard_obvious_8x28_seed_20260531.jsonl
profile: hard_obvious_8x28
seed: 20260531
defaults:
  inspect_args:
  - --no-log-model-api
  - --no-log-realtime
  - --timeout=900
  - --max-retries=1
  - --no-fail-on-error
  - --continue-on-fail
  - --score-on-error
  - --attempt-timeout=180
  - --max-connections=128
selection_policy:
  summary: Five independent cache-disabled trials for GPT-5.4 mini reasoning modes
    on hard_obvious_8x28.
  notes:
  - Run with scripts/run_model_panel.py using --no-cache and --no-skip-completed.
  - The same 224-item 8x28 dataset is used for every entry.
  - Temperature is fixed at 0 for the none condition; reasoning-enabled OpenAI modes
    may ignore temperature.
  - Max output tokens are fixed at 10000 for all four reasoning modes so the experiment
    isolates reasoning_effort rather than output-cap differences.
  - pass^3 and pass^5 should be computed from the five trial summaries per mode after
    the run completes.
  - Inspect max_connections is raised to 128 for this mini run to reduce wall-clock
    time.
entries:
