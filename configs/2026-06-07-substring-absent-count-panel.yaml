schema_version: paper-model-panel-v1
created_at: "2026-06-07"
run_status: planned
dataset: data/experiments/2026-06-07-substring-absent-count.jsonl
profile: substring_absent_count_10
seed: 20260607
defaults:
  inspect_args:
    - --no-log-model-api
    - --no-log-realtime
    - --timeout=900
    - --max-retries=1
    - --no-fail-on-error
    - --continue-on-fail
    - --score-on-error
    - --attempt-timeout=180
    - --max-connections=8
selection_policy:
  summary: One cache-disabled trial for absent-substring count questions across OpenAI GPT-5.5 base and Gemini 3.1 Flash Lite thinking levels.
  notes:
    - Run with scripts/run_model_panel.py using --no-cache and --no-skip-completed.
    - The dataset is a 10-item hand-authored experiment inspired by the Google AI Overview absent-substring failure mode.
    - OpenAI entries cover the GPT-5.5 base model at none, low, and medium thinking.
    - Gemini 3.1 Flash Lite entries reuse the existing minimal, low, medium, and high thinkingLevel convention.
entries:
  - id: gpt-5-5-none
    label: OpenAI GPT-5.5 base none
    provider_route: openai
    upstream_provider: openai
    provider_api: openai_responses
    inspect_model: openai/gpt-5.5
    model_id: gpt-5.5
    control_style: openai_reasoning_effort
    thinking_depth: none
    generation_settings:
      temperature: 0
      max_tokens: 10000
      reasoning_effort: none
      reasoning_summary: none
  - id: gpt-5-5-low
    label: OpenAI GPT-5.5 base low
    provider_route: openai
    upstream_provider: openai
    provider_api: openai_responses
    inspect_model: openai/gpt-5.5
    model_id: gpt-5.5
    control_style: openai_reasoning_effort
    thinking_depth: low
    generation_settings:
      max_tokens: 10000
      reasoning_effort: low
  - id: gpt-5-5-medium
    label: OpenAI GPT-5.5 base medium
    provider_route: openai
    upstream_provider: openai
    provider_api: openai_responses
    inspect_model: openai/gpt-5.5
    model_id: gpt-5.5
    control_style: openai_reasoning_effort
    thinking_depth: medium
    generation_settings:
      max_tokens: 10000
      reasoning_effort: medium
  - id: gemini-3-1-flash-lite-minimal
    label: Gemini 3.1 Flash Lite minimal
    provider_route: gemini
    upstream_provider: google
    provider_api: gemini_generate_content
    inspect_model: google/gemini-3.1-flash-lite
    model_id: gemini-3.1-flash-lite
    control_style: gemini_thinking_level
    thinking_depth: minimal
    configured_reasoning_tokens_per_sample: 1024
    generation_settings:
      max_tokens: 1096
      reasoning_effort: minimal
  - id: gemini-3-1-flash-lite-low
    label: Gemini 3.1 Flash Lite low
    provider_route: gemini
    upstream_provider: google
    provider_api: gemini_generate_content
    inspect_model: google/gemini-3.1-flash-lite
    model_id: gemini-3.1-flash-lite
    control_style: gemini_thinking_level
    thinking_depth: low
    configured_reasoning_tokens_per_sample: 1024
    generation_settings:
      max_tokens: 1096
      reasoning_effort: low
  - id: gemini-3-1-flash-lite-medium
    label: Gemini 3.1 Flash Lite medium
    provider_route: gemini
    upstream_provider: google
    provider_api: gemini_generate_content
    inspect_model: google/gemini-3.1-flash-lite
    model_id: gemini-3.1-flash-lite
    control_style: gemini_thinking_level
    thinking_depth: medium
    configured_reasoning_tokens_per_sample: 8192
    generation_settings:
      max_tokens: 8264
      reasoning_effort: medium
  - id: gemini-3-1-flash-lite-high
    label: Gemini 3.1 Flash Lite high
    provider_route: gemini
    upstream_provider: google
    provider_api: gemini_generate_content
    inspect_model: google/gemini-3.1-flash-lite
    model_id: gemini-3.1-flash-lite
    control_style: gemini_thinking_level
    thinking_depth: high
    configured_reasoning_tokens_per_sample: 24576
    generation_settings:
      max_tokens: 24648
      reasoning_effort: high
