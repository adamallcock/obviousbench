schema_version: paper-model-panel-v1
created_at: "2026-06-07"
run_status: planned
dataset: data/experiments/2026-06-07-substring-absent-count-suite.jsonl
profile: substring_absent_count_suite_80
seed: 20260607
defaults:
  inspect_args:
    - --no-log-model-api
    - --no-log-realtime
    - --timeout=900
    - --max-retries=1
    - --no-fail-on-error
    - --continue-on-fail
    - --score-on-error
    - --attempt-timeout=180
    - --max-connections=16
selection_policy:
  summary: Three independent cache-disabled trials for GPT-5.4 nano on the 80-item absent-substring count suite.
  notes:
    - Run with scripts/run_model_panel.py using --no-cache and --no-skip-completed.
    - The suite has 64 zero-target absent-substring traps and 16 positive controls.
    - Max output tokens are fixed at 10000 so the experiment isolates reasoning_effort.
    - pass^3 is computed with answer_correct as the primary reliability metric.
