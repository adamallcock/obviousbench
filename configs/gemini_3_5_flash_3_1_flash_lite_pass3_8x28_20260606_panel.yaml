run_status: planned
dataset: data/barrages/hard_obvious_8x28_seed_20260531.jsonl
profile: hard_obvious_8x28
dataset_seed: 20260531
source_panel: configs/model_thinking_settings_v1.yaml
defaults:
  inspect_args:
  - --no-log-model-api
  - --no-log-realtime
  - --timeout=1200
  - --max-retries=1
  - --no-fail-on-error
  - --continue-on-fail
  - --score-on-error
  - --attempt-timeout=300
  - --max-connections=128
selection_policy:
  summary: Three independent cache-disabled trials for Gemini 3.5 Flash and Gemini 3.1 Flash Lite thinking settings on hard_obvious_8x28.
  notes:
  - Run with --no-cache and --no-skip-completed.
  - pass^3 is computed with answer_correct as the primary y-axis metric for the requested curve.
  - Gemini 3 thinking settings use Inspect reasoning_effort, which maps to Gemini thinkingLevel.
  - Trial entries are cache-disabled and share the same dataset seed convention as the existing pass^3 panels.
