  artifact_registry:
    - id: v0-1-release-control-plane
      status_label: current
      paths:
        - configs/release_v0_1_0.yaml
        - configs/release_theme_v0_1_0.yaml
        - configs/release_surfaces_v0_1_0.yaml
      claim_allowed: Current local release-prep source of truth for generated surfaces.
      claim_disallowed: Do not cite as a model result snapshot.
    - id: paper-v1-8x28-current-223-final
      status_label: release_snapshot
      paths:
        - results/summaries/paper-v1-8x28-current-223-final-20260603/manifest.csv
        - results/summaries/paper-v1-8x28-current-223-final-20260603/comparison
        - docs/reports/2026-06-03-paper-v1-8x28-current-223-final
        - data/splits/paper_v1_manifest.jsonl
        - docs/reports/2026-06-03-paper-v1-8x28-current-223-final/wrong-answer-review.csv
      claim_allowed: Frozen v0.1 paper snapshot with 224 questions and 223 model/settings rows.
      claim_disallowed: Do not present as a live leaderboard or current provider behavior.
    - id: shareable-proof-point-2026-05-31
      status_label: proofpoint
      paths:
        - docs/shareable/2026-05-31-obviousbench-proof-point
      claim_allowed: Small recruiter-safe proof bundle and demo artifact.
      claim_disallowed: Do not use for v0.1 leaderboard, paper, or full release claims.
    - id: substring-absent-count-2026-06-07
      status_label: exploratory
      paths:
        - data/experiments
      claim_allowed: Research-only suite work for possible future benchmark additions.
      claim_disallowed: Do not mix with the frozen v0.1 paper snapshot.
    - id: paper-v1-combined-234-overline-2026-06-02
      status_label: stale
      paths:
        - docs/reports/2026-06-02-paper-v1-combined-234-overline
      claim_allowed: Historical context for superseded paper draft artifacts.
      claim_disallowed: Do not cite for current v0.1 counts, charts, or claims.

